<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 4</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Local CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

  <div class="container mt-5">
    <header class="text-center mb-5">
      <h1>Experiment 4: jQuery Effects</h1>
      <p class="text-muted">Dynamic DOM & jQuery Animation</p>
    </header>

    <main>
      <div class="row justify-content-center">
        <div class="col-md-8">
          <!-- Display Area -->
          <div class="card mb-4 shadow-sm" id="target-box">
            <div class="card-body text-center p-5">
              <h2 id="dynamic-title" class="card-title">Hello, World!</h2>
              <p id="dynamic-text" class="card-text">This is a dynamic element ready for interaction.</p>
            </div>
          </div>

          <!-- Controls -->
          <div class="card">
            <div class="card-body">
              <div class="row g-3 text-center">
                <div class="col-md-4">
                  <h5>DOM Manipulation</h5>
                  <button id="btn-update" class="btn btn-primary w-100">Update Content</button>
                </div>

                <div class="col-md-4">
                  <h5>jQuery Visibility</h5>
                  <div class="btn-group w-100" role="group">
                    <button id="btn-hide" class="btn btn-danger">Hide</button>
                    <button id="btn-show" class="btn btn-success">Show</button>
                  </div>
                </div>

                <div class="col-md-4">
                  <h5>jQuery Animation</h5>
                  <button id="btn-animate" class="btn btn-info w-100 text-white">Animate</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>

</html>
