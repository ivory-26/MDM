<!DOCTYPE html>
<html>

<head>
  <style>
    h1 {
      text-transform: uppercase;
    }

    button {
      background-color: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      transition: background-color 0.5s;
      animation: pulse 2s infinite;
    }

    button:hover {
      background-color: green;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <h1>Submit Form</h1>
  <button>Click Me</button>


</body>

</html>
