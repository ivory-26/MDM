<!DOCTYPE html>
<html>

<head>
  <style>
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      background-color: rgb(227, 114, 114);
      overflow: hidden;
    }

    li {
      float: right;
    }

    li a {
      display: block;
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      text-align: center;
    }

    li a:hover {
      background-color: rgb(250, 6, 6);
    }
  </style>
</head>

<body>

  <ul>
    <li><a href="#">Dashboard</a></li>
    <li><a href="#">Settings</a></li>
    <li><a href="#">Profile</a></li>
  </ul>

</body>

</html>
