<!DOCTYPE html>
<html>

<head>
  <title>Bootstrap Layout</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

  <!-- Navbar with requested tabs -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">FAQs</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <!-- Header moved outside of navbar -->
    <header class="mb-4">
      <h1>My Website</h1>
    </header>

    <div class="row">
      <div class="col-md-4 bg-light p-3">Column 1</div>
      <div class="col-md-4 bg-secondary text-white p-3">Column 2</div>
      <div class="col-md-4 bg-light p-3">Column 3</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
