<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic User Explorer | Exp 9</title>
    <meta name="description" content="A dynamic user exploration tool fetching data from a public API with real-time filtering.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>User Explorer</h1>
            <p>Real-time data synchronization with public API endpoints</p>
        </header>

        <main>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search users by name or email..." autocomplete="off">
            </div>

            <div id="loader" class="loader" style="display: none;"></div>
            <div id="user-grid" class="user-grid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
