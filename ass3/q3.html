<!DOCTYPE html>
<html>
<head>
    <title>AJAX Fetch Example</title>
</head>
<body>
    <h1>AJAX with JavaScript</h1>

    <button onclick="fetchData()">Fetch Data</button>

    <!-- Paragraph to display the fetched JSON -->
    <p id="jsonData"></p>

    <script>
        function fetchData() {
            // Modern way to fetch data using AJAX
            fetch('https://jsonplaceholder.typicode.com/todos/1')
                .then(response => response.json()) // Parse JSON
                .then(data => {
                    // Display the JSON data in the paragraph
                    document.getElementById('jsonData').innerText = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                });
        }
    </script>
</body>
</html>
